# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
# ACMI MCP Server — Persistent agent memory for any MCP host

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - upstashRedisRestUrl
      - upstashRedisRestToken
    properties:
      upstashRedisRestUrl:
        type: string
        description: "Upstash Redis REST endpoint URL (e.g. https://your-instance.upstash.io)"
        default: ""
      upstashRedisRestToken:
        type: string
        description: "Upstash Redis REST API token — keep this secret"
        default: ""
  commandFunction:
    |-
    (config) => ({
      command: 'npx',
      args: ['-y', '@madezmedia/acmi-mcp'],
      env: {
        UPSTASH_REDIS_REST_URL: config.upstashRedisRestUrl,
        UPSTASH_REDIS_REST_TOKEN: config.upstashRedisRestToken
      }
    })
  exampleConfig:
    upstashRedisRestUrl: "https://up-your-instance.upstash.io"
    upstashRedisRestToken: "AYV-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
