<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ACMI Open Graph image</title>
  <desc id="desc">ACMI v1.5 visual with profile, signals, and timeline pillars.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f2e7" />
      <stop offset="100%" stop-color="#efe4d1" />
